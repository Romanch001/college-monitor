name: College Website Monitor

on:
  schedule:
    # Runs every hour — change '0 *' to e.g. '0 8,12,18' for 3× a day only
    - cron: "0 * * * *"

  # Allow triggering manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  check-website:
    runs-on: ubuntu-latest

    # Needed so the job can commit the updated snapshot back to the repo
    permissions:
      contents: write

    steps:
      # 1. Checkout the repository (includes snapshot.txt if it exists)
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # 4. Run the monitor script
      - name: Run monitor
        env:
          EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python monitor.py

      # 5. If the snapshot changed, commit it back to the repo automatically
      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot.txt
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: update snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
